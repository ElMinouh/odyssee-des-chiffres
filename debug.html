<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Debug PWA - Odyssée</title>
<style>
body { font-family: monospace; background:#1a1f2e; color:#fff; padding:12px; font-size:14px; line-height:1.5; }
h1 { color:#f1c40f; margin:0 0 12px; font-size:18px; }
h2 { color:#3498db; margin:18px 0 6px; font-size:15px; border-bottom:1px solid #2c3e50; padding-bottom:4px; }
.ok { color:#2ecc71; }
.fail { color:#e74c3c; font-weight:700; }
.warn { color:#f39c12; }
.box { background:#0d1117; padding:8px; border-radius:6px; margin:6px 0; word-wrap:break-word; }
.btn { display:block; width:100%; padding:14px; background:#e74c3c; color:#fff; border:none; border-radius:8px; font-size:16px; font-weight:700; margin-top:18px; }
.btn:active { background:#c0392b; }
pre { white-space:pre-wrap; font-size:12px; margin:4px 0; }
</style>
</head>
<body>
<h1>🔍 Diagnostic PWA — L'Odyssée</h1>
<p>Cette page teste tous les composants. Copie-colle le résultat à Claude.</p>

<div id="results">Diagnostic en cours...</div>

<button class="btn" onclick="resetAll()">🧹 Tout nettoyer + recharger</button>
<button class="btn" style="background:#34495e;" onclick="dbgSkipWaiting()">⏭️ Activer le SW en attente (skipWaiting)</button>

<script>
const log = [];
function out(html) { 
  log.push(html); 
  document.getElementById('results').innerHTML = log.join('');
}

async function diagnose() {
  out('<h2>1. Environnement</h2>');
  out('<div class="box">User-Agent : <pre>' + navigator.userAgent + '</pre></div>');
  out('<div class="box">URL actuelle : <pre>' + location.href + '</pre></div>');
  out('<div class="box">Origin : <pre>' + location.origin + '</pre></div>');
  out('<div class="box">En ligne : ' + (navigator.onLine ? '<span class="ok">OUI</span>' : '<span class="fail">NON</span>') + '</div>');
  out('<div class="box">Mode standalone (PWA installée) : ' + 
    (window.matchMedia('(display-mode: standalone)').matches || window.matchMedia('(display-mode: fullscreen)').matches ? '<span class="warn">OUI (PWA)</span>' : '<span class="ok">NON (Chrome)</span>') + '</div>');

  out('<h2>2. Fichiers critiques</h2>');
  const files = [
    './index.html',
    './manifest.webmanifest',
    './sw.js',
    './css/styles.css',
    './js/01-core.js',
    './js/02-data.js',
    './js/03-figurines-data.js',
    './js/11-init.js',
    './assets/icon.svg',
    './assets/icon-192.png',
    './assets/icon-512.png',
    './assets/icon-maskable.png',
    './assets/favicon-32.png',
    './assets/apple-touch-icon.png',
    './assets/portraits.svg',
    './assets/fonts/google-fonts.css',
  ];
  for (const f of files) {
    try {
      const r = await fetch(f, { cache: 'no-cache' });
      const ct = r.headers.get('content-type') || '?';
      const ok = r.ok && (
        f.endsWith('.html') ? ct.includes('html') :
        f.endsWith('.js') ? (ct.includes('javascript') || ct.includes('text')) :
        f.endsWith('.css') ? ct.includes('css') :
        f.endsWith('.svg') ? ct.includes('svg') :
        f.endsWith('.png') ? ct.includes('png') :
        f.endsWith('.webmanifest') ? (ct.includes('json') || ct.includes('manifest')) :
        true
      );
      out('<div class="box">' + (ok ? '<span class="ok">✅</span>' : '<span class="fail">❌</span>') + ' ' + f + ' → HTTP ' + r.status + ' (' + ct + ')</div>');
    } catch (e) {
      out('<div class="box"><span class="fail">❌ ERREUR</span> ' + f + ' → ' + e.message + '</div>');
    }
  }

  out('<h2>3. Service Workers</h2>');
  if (!('serviceWorker' in navigator)) {
    out('<div class="box"><span class="fail">PAS DE SUPPORT SW</span></div>');
  } else {
    try {
      const regs = await navigator.serviceWorker.getRegistrations();
      out('<div class="box">SW enregistrés : <strong>' + regs.length + '</strong></div>');
      for (const reg of regs) {
        out('<div class="box">  Scope : <pre>' + reg.scope + '</pre>' + 
          'Active : ' + (reg.active ? '<span class="ok">OUI (' + reg.active.scriptURL + ', state: ' + reg.active.state + ')</span>' : '<span class="fail">NON</span>') + '<br>' +
          'Waiting : ' + (reg.waiting ? '<span class="warn">OUI</span>' : '<span class="ok">non</span>') + '<br>' +
          'Installing : ' + (reg.installing ? '<span class="warn">OUI</span>' : '<span class="ok">non</span>') + 
          '</div>');
      }
    } catch (e) {
      out('<div class="box"><span class="fail">❌ Erreur lecture SW</span> : ' + e.message + '</div>');
    }
  }

  out('<h2>4. Caches</h2>');
  try {
    const keys = await caches.keys();
    out('<div class="box">Caches : <strong>' + keys.length + '</strong></div>');
    for (const key of keys) {
      const cache = await caches.open(key);
      const reqs = await cache.keys();
      out('<div class="box">' + key + ' → <strong>' + reqs.length + ' entrées</strong></div>');
    }
  } catch (e) {
    out('<div class="box"><span class="fail">❌ Erreur caches</span> : ' + e.message + '</div>');
  }

  out('<h2>5. Manifest (parsé)</h2>');
  try {
    const r = await fetch('./manifest.webmanifest');
    const m = await r.json();
    out('<div class="box">Name : ' + m.name + '<br>start_url : ' + m.start_url + '<br>scope : ' + m.scope + '<br>icons : ' + (m.icons ? m.icons.length : 0) + '</div>');
    if (m.icons) {
      for (const ic of m.icons) {
        try {
          const ir = await fetch(ic.src, { cache: 'no-cache' });
          const ict = ir.headers.get('content-type') || '?';
          const expected = ic.type || '';
          const ok = ir.ok && (expected ? ict.includes(expected.split('/')[1]) : true);
          out('<div class="box">  ' + (ok ? '<span class="ok">✅</span>' : '<span class="fail">❌</span>') + ' ' + ic.src + ' (attendu: ' + (expected || '?') + ' / reçu: ' + ict + ')</div>');
        } catch (e) {
          out('<div class="box">  <span class="fail">❌</span> ' + ic.src + ' → ' + e.message + '</div>');
        }
      }
    }
  } catch (e) {
    out('<div class="box"><span class="fail">❌ Manifest illisible</span> : ' + e.message + '</div>');
  }

  out('<h2>6. Profil &amp; état adaptatif</h2>');
  renderAdaptiveState();

  out('<h2>7. Forcer la phase d\'année</h2>');
  renderPhaseControls();

  out('<h2>8. Forcer l\'enrage boss</h2>');
  renderEnrageControl();

  out('<h2>✅ Diagnostic terminé</h2>');
  out('<div class="box">Capture cette page entière en screenshot et envoie-la à Claude.</div>');
}

// ── v10.0.0 (Chantier 3) : outils de debug avancés ────────────────
const YEAR_LEVELS = ['PS','MS','GS','CP','CE1','CE2','CM1','CM2','6E','5E','4E','3E'];
const OP_LABELS = {'+':'+','-':'−','x':'×','×':'×','/':'÷','÷':'÷','frac':'frac','num':'déc','geo':'géo','mes':'mes','prop':'prop','rel':'rel','litt':'litt','fonc':'fonc','stat':'stat','arith':'arith','algo':'algo'};

function dbgProfileName(){
  try{ return localStorage.getItem('lastPlayer') || ''; }catch(e){ return ''; }
}
function dbgLoadProfile(name){
  try{ return JSON.parse(localStorage.getItem('user_'+name) || 'null'); }catch(e){ return null; }
}
function dbgSaveProfile(name, P){
  try{ localStorage.setItem('user_'+name, JSON.stringify(P)); return true; }catch(e){ return false; }
}
function phaseOf(v){ v = (typeof v==='number'&&isFinite(v))?v:0; return v<0.34?1:(v<0.67?2:3); }
function phaseColor(p){ return p===1?'#e74c3c':p===2?'#f39c12':'#2ecc71'; }
function phaseLabel(p){ return p===1?'début (P1)':p===2?'milieu (P2)':'fin (P3)'; }

function renderAdaptiveState(){
  const name = dbgProfileName();
  if(!name){ out('<div class="box"><span class="warn">Aucun joueur récent (clé lastPlayer absente).</span></div>'); return; }
  const P = dbgLoadProfile(name);
  if(!P){ out('<div class="box"><span class="fail">Profil user_'+name+' introuvable.</span></div>'); return; }
  out('<div class="box">Joueur : <strong>'+name+'</strong> · XP '+(P.xp||0)+' · ⭐'+(P.stars||0)+'</div>');
  // Jauge d'année par niveau
  const yp = P.yearProgress || {};
  let rows = '<div class="box"><div style="margin-bottom:6px;color:#888;">Jauge d\'année (phase pilotant l\'enrichissement) :</div>';
  let any = false;
  for(const lvl of YEAR_LEVELS){
    if(typeof yp[lvl] !== 'number') continue;
    any = true;
    const v = yp[lvl]; const p = phaseOf(v); const c = phaseColor(p);
    rows += '<div style="display:flex;align-items:center;gap:8px;padding:2px 0;">'
      + '<span style="width:36px;">'+lvl+'</span>'
      + '<span style="flex:1;height:8px;background:#2c3e50;border-radius:4px;position:relative;">'
      + '<span style="position:absolute;left:0;top:0;height:8px;width:'+Math.round(v*100)+'%;background:'+c+';border-radius:4px;"></span></span>'
      + '<span style="color:'+c+';width:80px;text-align:right;">'+phaseLabel(p)+'</span></div>';
  }
  if(!any) rows += '<span class="warn">Aucune progression d\'année enregistrée (jauges à 0).</span>';
  rows += '</div>';
  out(rows);
  // Stats par opération
  const os = P.opStats || {};
  const parts = Object.keys(os).map(k=>{
    const s = os[k]||{}; const lab = OP_LABELS[k]||k;
    return lab+' '+(s.ok||0)+'/'+(s.fail||0);
  });
  out('<div class="box">Stats (ok/fail) : '+(parts.length?parts.join(' · '):'<span class="warn">aucune</span>')+'</div>');
  // Journal de révision espacée
  const el = Array.isArray(P.errorLog) ? P.errorLog.length : 0;
  out('<div class="box">Révision espacée : <span class="'+(el?'warn':'ok')+'">'+el+' erreur(s) en attente</span></div>');
}

function renderPhaseControls(){
  const name = dbgProfileName();
  if(!name || !dbgLoadProfile(name)){ out('<div class="box"><span class="warn">Pas de profil à modifier.</span></div>'); return; }
  let sel = '<select id="dbg-level" style="width:100%;background:#0d1117;color:#fff;border:1px solid #2c3e50;border-radius:6px;padding:7px;font-family:monospace;margin-bottom:7px;">';
  for(const lvl of YEAR_LEVELS) sel += '<option value="'+lvl+'">'+lvl+'</option>';
  sel += '</select>';
  out('<div class="box">'+sel
    + '<div style="display:flex;gap:6px;">'
    + '<button onclick="dbgSetPhase(0.10)" style="flex:1;background:#e74c3c;color:#fff;border:none;border-radius:6px;padding:9px;font-family:monospace;font-weight:700;">Début</button>'
    + '<button onclick="dbgSetPhase(0.50)" style="flex:1;background:#f39c12;color:#fff;border:none;border-radius:6px;padding:9px;font-family:monospace;font-weight:700;">Milieu</button>'
    + '<button onclick="dbgSetPhase(0.90)" style="flex:1;background:#2ecc71;color:#fff;border:none;border-radius:6px;padding:9px;font-family:monospace;font-weight:700;">Fin</button>'
    + '</div><div id="dbg-phase-msg" style="margin-top:6px;font-size:12px;"></div></div>');
}
function dbgSetPhase(val){
  const name = dbgProfileName();
  const P = dbgLoadProfile(name);
  if(!P){ return; }
  const lvl = document.getElementById('dbg-level').value;
  if(!P.yearProgress || typeof P.yearProgress!=='object') P.yearProgress = {};
  P.yearProgress[lvl] = val;
  const ok = dbgSaveProfile(name, P);
  const p = phaseOf(val);
  document.getElementById('dbg-phase-msg').innerHTML = ok
    ? '<span class="ok">✅ '+lvl+' → '+phaseLabel(p)+'. Relance une partie pour l\'appliquer.</span>'
    : '<span class="fail">❌ Échec d\'écriture.</span>';
}

function renderEnrageControl(){
  let on = false;
  try{ on = localStorage.getItem('odyssee_dbg_enrage')==='1'; }catch(e){}
  out('<div class="box"><button id="dbg-enrage-btn" onclick="dbgToggleEnrage()" style="width:100%;background:'+(on?'#8e44ad':'#34495e')+';color:#fff;border:none;border-radius:6px;padding:10px;font-family:monospace;font-weight:700;">🔥 Enrage auto : '+(on?'ACTIVÉ':'désactivé')+'</button>'
    + '<div style="font-size:11px;color:#888;margin-top:4px;">Si activé, le prochain boss entre en colère dès son apparition.</div></div>');
}
function dbgToggleEnrage(){
  let on = false;
  try{ on = localStorage.getItem('odyssee_dbg_enrage')==='1'; localStorage.setItem('odyssee_dbg_enrage', on?'0':'1'); }catch(e){}
  const btn = document.getElementById('dbg-enrage-btn');
  const now = !on;
  btn.style.background = now ? '#8e44ad' : '#34495e';
  btn.textContent = '🔥 Enrage auto : ' + (now ? 'ACTIVÉ' : 'désactivé');
}

async function dbgSkipWaiting(){
  try{
    const reg = await navigator.serviceWorker.getRegistration();
    const target = (reg && (reg.waiting || reg.active)) || navigator.serviceWorker.controller;
    if(target){ target.postMessage('skipWaiting'); alert('Message skipWaiting envoyé au SW.'); }
    else alert('Aucun SW à activer.');
  }catch(e){ alert('Erreur : '+e.message); }
}

async function resetAll() {
  if (!confirm('Tout nettoyer (caches + SW) puis recharger ?')) return;
  try {
    const regs = await navigator.serviceWorker.getRegistrations();
    await Promise.all(regs.map(r => r.unregister()));
    const keys = await caches.keys();
    await Promise.all(keys.map(k => caches.delete(k)));
    alert('Nettoyé. La page va se recharger.');
    location.reload();
  } catch (e) {
    alert('Erreur : ' + e.message);
  }
}

diagnose();
</script>
</body>
</html>
