<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#5d6d7e"/>
      <stop offset="60%" stop-color="#34495e"/>
      <stop offset="100%" stop-color="#1a252f"/>
    </radialGradient>
    <linearGradient id="g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f1c40f"/>
      <stop offset="100%" stop-color="#e67e22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Fond rond -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Étoiles décoratives -->
  <circle cx="80" cy="100" r="3" fill="#fff" opacity=".7"/>
  <circle cx="430" cy="80" r="2" fill="#fff" opacity=".5"/>
  <circle cx="450" cy="200" r="2.5" fill="#fff" opacity=".6"/>
  <circle cx="60" cy="380" r="2" fill="#fff" opacity=".5"/>
  <circle cx="100" cy="430" r="3" fill="#fff" opacity=".7"/>
  <circle cx="380" cy="450" r="2.5" fill="#fff" opacity=".6"/>
  <!-- Le château / temple -->
  <g transform="translate(256, 280)">
    <!-- Base -->
    <rect x="-130" y="60" width="260" height="80" fill="#2c3e50" rx="6"/>
    <!-- Tour centrale -->
    <rect x="-50" y="-90" width="100" height="180" fill="#34495e"/>
    <polygon points="-60,-90 60,-90 0,-160" fill="#e74c3c"/>
    <rect x="-15" y="-50" width="30" height="50" fill="#1a252f" rx="2"/>
    <!-- Tours latérales -->
    <rect x="-130" y="-30" width="60" height="120" fill="#34495e"/>
    <polygon points="-135,-30 -65,-30 -100,-80" fill="#e74c3c"/>
    <rect x="70" y="-30" width="60" height="120" fill="#34495e"/>
    <polygon points="65,-30 135,-30 100,-80" fill="#e74c3c"/>
    <!-- Créneaux -->
    <rect x="-130" y="60" width="20" height="14" fill="#2c3e50"/>
    <rect x="-100" y="60" width="20" height="14" fill="#2c3e50"/>
    <rect x="-70" y="60" width="20" height="14" fill="#2c3e50"/>
    <rect x="50" y="60" width="20" height="14" fill="#2c3e50"/>
    <rect x="80" y="60" width="20" height="14" fill="#2c3e50"/>
    <rect x="110" y="60" width="20" height="14" fill="#2c3e50"/>
  </g>
  <!-- Le chiffre/symbole rayonnant au centre -->
  <g transform="translate(256, 200)" filter="url(#glow)">
    <text x="0" y="20" font-family="serif" font-size="120" font-weight="bold"
          text-anchor="middle" fill="url(#g)">∑</text>
  </g>
  <!-- Étoiles d'XP en bas -->
  <g transform="translate(256, 440)">
    <text x="-90" y="0" font-size="36" text-anchor="middle">⭐</text>
    <text x="0" y="6" font-size="48" text-anchor="middle">⭐</text>
    <text x="90" y="0" font-size="36" text-anchor="middle">⭐</text>
  </g>
</svg>
